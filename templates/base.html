<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExtractoAI — Intelligent Invoice Extraction & Auditing</title>
    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts for Editorial Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(243, 244, 246, 0.9) 0%, rgba(248, 250, 252, 1) 90.7%);
        }
        h1, h2, h3, h4, .font-heading {
            font-family: 'Outfit', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .custom-glow {
            box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.15);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased text-slate-800">

    <!-- Premium Glassmorphic Header -->
    <header class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-slate-200/80 shadow-sm transition-all duration-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                
                <!-- Brand logo with dynamic animations -->
                <div class="flex items-center gap-3 group.">
                    <a href="/" class="flex items-center gap-3.5 select-none">
                        <div class="bg-gradient-to-tr from-indigo-600 via-indigo-500 to-indigo-400 text-white p-3 rounded-xl shadow-lg shadow-indigo-500/20 flex items-center justify-center transform transition-transform group-hover:scale-105 duration-300">
                            <i class="fa-solid fa-microchip-ai text-2xl animate-pulse"></i>
                        </div>
                        <div>
                            <span class="font-extrabold text-slate-900 tracking-tight block text-xl leading-none font-heading">Extracto<span class="text-indigo-600">AI</span></span>
                            <span class="text-[10px] text-slate-400 font-bold tracking-widest uppercase mt-0.5 block">Invoice Auditing Console</span>
                        </div>
                    </a>
                </div>

                <!-- Navigation link buttons with slide animations -->
                <nav class="flex space-x-2 bg-slate-100/80 p-1.5 rounded-xl border border-slate-200/50">
                    <a href="/" class="inline-flex items-center gap-2.5 text-sm font-semibold px-4 py-2.5 rounded-lg transition-all duration-200 text-slate-600 hover:text-indigo-600 hover:bg-white/80 active:scale-95 shadow-sm hover:shadow-indigo-500/5" id="nav-upload">
                        <i class="fa-solid fa-arrow-up-from-bracket"></i>
                        <span class="hidden sm:inline">Ingestion</span>
                    </a>
                    <a href="/dashboard" class="inline-flex items-center gap-2.5 text-sm font-semibold px-4 py-2.5 rounded-lg transition-all duration-200 text-slate-600 hover:text-indigo-600 hover:bg-white/80 active:scale-95 shadow-sm hover:shadow-indigo-500/5" id="nav-dashboard">
                        <i class="fa-solid fa-square-poll-horizontal"></i>
                        <span class="hidden sm:inline">Dashboard Log</span>
                    </a>
                </nav>

            </div>
        </div>
    </header>

    <!-- Main Workspace Frame -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-10">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer System Component -->
    <footer class="bg-white border-t border-slate-200/80 py-5 text-center text-xs text-slate-400 font-medium mt-12 shadow-inner">
        <div class="max-w-7xl mx-auto px-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                &copy; 2026 <span class="font-semibold text-slate-500">ExtractoAI Technologies</span>. Managed Locally & Securely.
            </div>
            

        </div>
    </footer>

    <!-- Highlight active routes cleanly -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const path = window.location.pathname;
            const uploadBtn = document.getElementById("nav-upload");
            const dashboardBtn = document.getElementById("nav-dashboard");
            
            if (path === "/" || path === "") {
                uploadBtn.classList.add("bg-white", "text-indigo-600", "shadow");
            } else if (path.startsWith("/dashboard")) {
                dashboardBtn.classList.add("bg-white", "text-indigo-600", "shadow");
            }
        });
    </script>

</body>
</html>
