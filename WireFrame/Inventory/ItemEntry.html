<!DOCTYPE html>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice Item Entry</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f5f9;
            margin: 0;
        }

        header {
            background: #0f172a;
            color: white;
            padding: 15px 25px;
            font-size: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            background: white;
            padding: 25px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        h2 {
            margin-top: 0;
            color: #1e293b;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }

        label {
            font-size: 13px;
            color: #334155;
        }

        input, select {
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 14px;
            width: 100%;
        }

        .barcode {
            border: 2px solid #0ea5e9;
            background: #f0f9ff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border-bottom: 1px solid #e5e7eb;
            padding: 10px;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: #f8fafc;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-add {
            background: #2563eb;
            color: white;
        }

        .btn-save {
            background: #16a34a;
            color: white;
            margin-top: 15px;
        }

        .right {
            text-align: right;
        }
    </style>
</head>

<script>
document.getElementById('invoiceFile')?.addEventListener('change', function() {
    const fileName = this.files[0]?.name || '';
    document.getElementById('fileName').textContent = fileName;
});
function generateBarcode(button) {
    const row = button.closest("tr");
    const barcodeValue = row.querySelector(".barcode-value").textContent;

    // Get next row (barcode row)
    let barcodeRow = row.nextElementSibling;

    if (!barcodeRow || !barcodeRow.classList.contains("barcode-row")) {
        barcodeRow = document.createElement("tr");
        barcodeRow.className = "barcode-row";
        barcodeRow.innerHTML = `
            <td colspan="8">
                <svg class="barcode"></svg>
            </td>
        `;
        row.parentNode.insertBefore(barcodeRow, row.nextSibling);
    }

    barcodeRow.style.display = "table-row";

    const svg = barcodeRow.querySelector("svg");

    JsBarcode(svg, barcodeValue, {
        format: "CODE128",
        width: 2,
        height: 40,
        displayValue: true
    });
}
</script>

<body>

<header>
    Invoice Item Entry (Barcode Enabled)
</header>

<div class="container">

    <h2>Invoice Details</h2>

<div>
    <label><b>Upload Invoice (PDF)</b></label>
    <input type="file" id="invoiceFile" accept="application/pdf" hidden>
    <button class="btn btn-add" onclick="document.getElementById('invoiceFile').click()">
        Upload PDF
    </button>
    <span id="fileName" style="margin-left:10px;font-size:13px;color:#475569;"></span>
</div>

    <!-- Invoice Header -->
    <div class="form-row">
        <div>
            <label>Invoice No</label>
            <input type="text">
        </div>
        <div>
            <label>Invoice Date</label>
            <input type="date">
        </div>
        <div>
            <label>Supplier</label>
            <select>
                <option>Select Supplier</option>
                <option>ABC Metals</option>
                <option>XYZ Bearings</option>
            </select>
        </div>
        <div>
            <label>GRN No</label>
            <input type="text" placeholder="Auto">
        </div>
    </div>

    <hr>

   
    
    <!-- Item Table -->
    <table>
        <thead>
            <tr>
			
                <th>Barcode</th>
				<th>Action</th>
                <th>Item</th>
                <th>Qty</th>
                <th>Unit</th>
                <th>Price</th>
                <th>Tax</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            
<tr>
    <td>
        <span class="barcode-value">890123456</span>
    </td>
	 <td>
        <button class="btn btn-add" onclick="generateBarcode(this)">
            Generate Barcode
        </button>
    </td>
    <td>Bearing 6204</td>
    <td>10</td>
    <td>Nos</td>
    <td>250</td>
    <td>18%</td>
    <td>2950</td>
	<td> <button class="btn btn-add">Add Item</button></td>
   
</tr>
<tr>
    <td>
        <span class="barcode-value">890123456</span>
    </td>
	 <td>
        <button class="btn btn-add" onclick="generateBarcode(this)">
            Generate Barcode
        </button>
    </td>
    <td>Bearing 6204</td>
    <td>10</td>
    <td>Nos</td>
    <td>250</td>
    <td>18%</td>
    <td>2950</td>
	<td> <button class="btn btn-add">Add Item</button></td>
   
</tr>

        </tbody>
    </table>

    <div class="right">
        <button class="btn btn-save">Save Invoice</button>
    </div>

</div>

</body>
</html>
