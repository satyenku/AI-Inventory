<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspection Entry</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f4f6f9;
        display: flex;
      }

      /* SIDEBAR */
      .sidebar {
        width: 240px;
        background: #0f172a;
        color: #fff;
        min-height: 100vh;
        padding-top: 20px;
        position: fixed;
        left: 0;
        top: 0;
      }

      .sidebar h2 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 20px;
      }

      .sidebar a {
        display: block;
        padding: 12px 20px;
        color: #cbd5e1;
        text-decoration: none;
        font-size: 15px;
      }

      .sidebar a:hover {
        background: #1e293b;
        color: #fff;
      }

      /* MAIN CONTENT */
      .container {
        margin-left: 260px;
        width: calc(100% - 260px);
        padding: 25px;
      }

      h1 {
        text-align: center;
        margin-bottom: 25px;
      }

      /* HEADER GRID */
      .header-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        margin-bottom: 25px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
      }

      .form-group label {
        font-weight: bold;
        margin-bottom: 5px;
      }

      .form-group input,
      .form-group select {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      /* TABLE */
      .table-wrapper {
        overflow-x: auto;
        background: white;
        border-radius: 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1200px;
      }

      table th,
      table td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: center;
      }

      table th {
        background: #f0f0f0;
      }

      table input {
        width: 100%;
        padding: 6px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }

      .readonly-cell {
        background: #f8f8f8;
        font-weight: bold;
      }

      /* BUTTON */
      .action-section {
        margin-top: 20px;
        text-align: right;
      }

      .btn-save {
        border: none;
        background: #007bff;
        color: white;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
      }

      .btn-save:hover {
        background: #0056b3;
      }
    </style>
  </head>

  <body>
    <!-- SIDEBAR -->
    <div class="sidebar">
      <h2>Inventory</h2>
      <a href="{{ url_for('dashboard') }}">📊 Dashboard</a>
      <a href="{{ url_for('product_master') }}">📦 Product Master</a>
      <a href="{{ url_for('inspection_entry') }}">🔍 Inspection Entry</a>
      <a href="{{ url_for('item_issue') }}">🧾 Item Issue</a>
      <a href="{{ url_for('item_entry') }}">🧾 Item Entry</a>
      <a href="{{ url_for('inventory_status') }}">📈 Inventory Status</a>
      <a href="{{ url_for('inventory_return') }}">📈 Return Inventory</a>
      <a href="{{ url_for('supplier_management') }}">👥 Suppliers</a>
      <a href="{{ url_for('user_management') }}">👤 Users</a>
      <a href="{{ url_for('logout') }}" style="color: #ef4444">🚪 Sign Out</a>
    </div>

    <!-- MAIN -->
    <div class="container">
      <h1>Inspection Entry</h1>

      <div class="header-grid">
        <div class="form-group">
          <label>Inspection No</label>
          <input type="text" id="inspectionNo" value="INS-001" />
        </div>

        <div class="form-group">
          <label>Inspection Date</label>
          <input type="date" id="inspectionDate" />
        </div>

        <div class="form-group">
          <label>Select Product</label>
          <select id="productSelect" onchange="loadSpecifications()">
            <option value="">Select Product</option>
          </select>
        </div>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th rowspan="2">Sr No</th>
              <th rowspan="2">Property</th>
              <th colspan="3">Specification Details</th>
              <th colspan="5">Observations</th>
              <th rowspan="2">Remarks</th>
            </tr>

            <tr>
              <th>Min</th>
              <th>Max</th>
              <th>Method</th>
              <th>Obs1</th>
              <th>Obs2</th>
              <th>Obs3</th>
              <th>Obs4</th>
              <th>Obs5</th>
            </tr>
          </thead>

          <tbody id="inspectionBody"></tbody>
        </table>
      </div>

      <div class="action-section">
        <button class="btn-save" onclick="saveInspection()">
          Save Inspection
        </button>
      </div>
    </div>

    <script>
      window.onload = function () {
        loadProducts();

        document.getElementById("inspectionDate").value = new Date()
          .toISOString()
          .split("T")[0];
      };

      async function loadProducts() {
        try {
          const response = await fetch("/api/products");

          const data = await response.json();

          const select = document.getElementById("productSelect");

          select.innerHTML = '<option value="">Select Product</option>';

          data.products.forEach((product) => {
            select.innerHTML += `
                <option value="${product.id}">
                    ${product.item_name}
                </option>
            `;
          });
        } catch (error) {
          console.error("Error loading products:", error);
        }
      }

      async function loadSpecifications() {
        const productId = document.getElementById("productSelect").value;

        const tbody = document.getElementById("inspectionBody");

        tbody.innerHTML = "";

        if (!productId) return;

        try {
          const response = await fetch(`/api/product-properties/${productId}`);

          const data = await response.json();

          data.properties.forEach((spec, index) => {
            tbody.innerHTML += `

            <tr>

                <td>${index + 1}</td>

                <td class="readonly-cell"
                    data-property-id="${spec.id}">
                    ${spec.property_name}
                </td>

                <td class="readonly-cell">
                    ${spec.min_value ?? ""}
                </td>

                <td class="readonly-cell">
                    ${spec.max_value ?? ""}
                </td>

                <td class="readonly-cell">
                    ${spec.method ?? ""}
                </td>

                <td>
                    <input type="text"
                           class="obs1">
                </td>

                <td>
                    <input type="text"
                           class="obs2">
                </td>

                <td>
                    <input type="text"
                           class="obs3">
                </td>

                <td>
                    <input type="text"
                           class="obs4">
                </td>

                <td>
                    <input type="text"
                           class="obs5">
                </td>

                <td>
                    <input type="text"
                           class="remarks">
                </td>

            </tr>

            `;
          });
        } catch (error) {
          console.error("Error loading properties:", error);
        }
      }

      async function saveInspection() {
        const productId = document.getElementById("productSelect").value;

        if (!productId) {
          alert("Please select a product.");

          return;
        }

        const details = [];

        document.querySelectorAll("#inspectionBody tr").forEach((row) => {
          details.push({
            product_property_id: row.cells[1].dataset.propertyId,

            property_name: row.cells[1].innerText,

            obs1: row.querySelector(".obs1").value,

            obs2: row.querySelector(".obs2").value,

            obs3: row.querySelector(".obs3").value,

            obs4: row.querySelector(".obs4").value,

            obs5: row.querySelector(".obs5").value,

            remarks: row.querySelector(".remarks").value,
          });
        });

        const payload = {
          inspection_no: document.getElementById("inspectionNo").value,

          inspection_date: document.getElementById("inspectionDate").value,

          product_id: productId,

          details: details,
        };

        console.log(payload);

        try {
          const response = await fetch("/api/save-inspection", {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify(payload),
          });

          const result = await response.json();

          alert(result.message || "Inspection saved successfully.");
        } catch (error) {
          console.error(error);

          alert("Error saving inspection.");
        }
      }
    </script>
  </body>
</html>
