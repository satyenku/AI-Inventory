<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>System Login</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        background: white;
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 380px;
      }
      h2 {
        margin-top: 0;
        color: #1e293b;
        text-align: center;
      }
      label {
        font-size: 13px;
        color: #475569;
        display: block;
        margin-bottom: 5px;
      }
      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 20px;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
      }
      button:hover {
        background: #1d4ed8;
      }
      .flash {
        color: #dc2626;
        text-align: center;
        margin-bottom: 15px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Warehouse Login</h2>
      {% with messages = get_flashed_messages() %} {% if messages %} {% for
      message in messages %}
      <div class="flash">{{ message }}</div>
      {% endfor %} {% endif %} {% endwith %}
      <form action="{{ url_for('login') }}" method="POST">
        <label>Username</label>
        <input type="text" name="username" placeholder="e.g. admin" required />
        <label>Password</label>
        <input
          type="password"
          name="password"
          placeholder="••••••••"
          required
        />
        <button type="submit">Sign In</button>
      </form>
    </div>
  </body>
</html>
